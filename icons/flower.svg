  <circle cx="256" cy="256" r="34" fill="#fff0f8"/>
  <!-- center dots -->
  <circle cx="256" cy="234" r="5" fill="#e05580" opacity=".6"/>
  <circle cx="274" cy="246" r="5" fill="#e05580" opacity=".6"/>
  <circle cx="268" cy="268" r="5" fill="#e05580" opacity=".6"/>
  <circle cx="244" cy="270" r="5" fill="#e05580" opacity=".6"/>
