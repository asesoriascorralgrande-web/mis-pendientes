<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#18090e"/>
  <!-- petals outer -->
  <g opacity=".92">
    <ellipse cx="256" cy="148" rx="38" ry="78" fill="#e05580" transform="rotate(0,256,256)"/>
    <ellipse cx="256" cy="148" rx="38" ry="78" fill="#c83868" transform="rotate(45,256,256)"/>
    <ellipse cx="256" cy="148" rx="38" ry="78" fill="#e05580" transform="rotate(90,256,256)"/>
    <ellipse cx="256" cy="148" rx="38" ry="78" fill="#c83868" transform="rotate(135,256,256)"/>
    <ellipse cx="256" cy="148" rx="38" ry="78" fill="#e05580" transform="rotate(180,256,256)"/>
